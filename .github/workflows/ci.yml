name: CI Pipeline

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node for Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Hùng sẽ bổ sung thêm step setup Java và chạy lệnh test ở đây sau
      - name: Check file structure
        run: ls -la