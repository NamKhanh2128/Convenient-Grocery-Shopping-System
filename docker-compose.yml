version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dcho_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: shopping_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dcho_network

  redis:
    image: redis:7-alpine
    container_name: dcho_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dcho_network

  backend:
    build: ./backend
    container_name: dcho_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/shopping_db
      - SPRING_REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - dcho_network

  frontend:
    build: ./frontend
    container_name: dcho_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dcho_network

volumes:
  pgdata:

networks:
  dcho_network:
    driver: bridge